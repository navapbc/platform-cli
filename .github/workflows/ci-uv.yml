name: CI (uv)

on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string
      os:
        required: true
        type: string

jobs:
  lint:
    name: Lint
    runs-on: ${{ inputs.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ inputs.python-version }}
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install packages
        run: make deps

      - name: Run lint
        run: make check-static

  test:
    name: Test
    runs-on: ${{ inputs.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/configure-git
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ inputs.python-version }}
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install packages
        run: make deps

      - name: Run test
        run: make test

  install:
    name: Install with uv
    runs-on: ${{ inputs.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/configure-git
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ inputs.python-version }}
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install with uv
        run: uv tool install .

      - name: Run --help
        run: nava-platform --help

      - name: Run e2e
        run: make test-e2e
